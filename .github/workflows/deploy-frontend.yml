name: Deploy SprintQuest Frontend

on:
  push:
    branches:
      - release/deployment-prep
    paths:
      - "frontend/sprintquest-ui/**"
      - ".github/workflows/deploy-frontend.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sprintquest-frontend-production
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  FRONTEND_DIRECTORY: frontend/sprintquest-ui
  VITE_API_BASE_URL: https://sprintquest-api-jd-2026-bpd5gyhzghhxgdgt.australiaeast-01.azurewebsites.net
  VITE_DEFAULT_SPRINT_ID: f3189605-5fb1-4b66-a9d7-f545bbf17407

jobs:
  deploy:
    name: Build, test, and deploy frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/sprintquest-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIRECTORY }}
        run: npm ci

      - name: Test frontend
        working-directory: ${{ env.FRONTEND_DIRECTORY }}
        run: npm test

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIRECTORY }}
        run: npm run build

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: frontend/sprintquest-ui/dist
          api_location: ""
          output_location: ""
          skip_app_build: true
          production_branch: release/deployment-prep
