name: Deploy SprintQuest API

on:
  push:
    branches:
      - release/deployment-prep
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sprintquest-api-production
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: sprintquest-api-jd-2026
  DOTNET_VERSION: "10.0.x"
  PUBLISH_DIRECTORY: ./backend-publish

jobs:
  deploy:
    name: Build, test, and deploy API
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend
        run: dotnet restore backend/SprintQuest.sln

      - name: Build backend
        run: >
          dotnet build backend/SprintQuest.sln
          --configuration Release
          --no-restore

      - name: Test backend
        run: >
          dotnet test backend/SprintQuest.sln
          --configuration Release
          --no-build

      - name: Publish API
        run: >
          dotnet publish backend/SprintQuest.Api/SprintQuest.Api.csproj
          --configuration Release
          --no-restore
          --output "${{ env.PUBLISH_DIRECTORY }}"

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIRECTORY }}
